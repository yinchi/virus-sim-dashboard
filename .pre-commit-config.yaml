repos:
- repo: https://github.com/pycqa/isort
  rev: 8.0.1
  hooks:
  - id: isort
    types_or:
      - python
      - pyi
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.5
  hooks:
  - id: ruff-check
    args:
    - --config
    - .ruff.toml
    - --fix
    types_or:
    - python
    - pyi
  - id: ruff-format
    args:
    - --config
    - .ruff.toml
    types_or:
    - python
    - pyi
- repo: local
  # Run mypy once on the entire ./src directory, regardless of which files were changed.
  # This is because mypy needs to see the entire codebase to properly check types.
  hooks:
  - id: mypy
    name: mypy
    language: system
    entry: uv run mypy ./src
    always_run: true
    pass_filenames: false
- repo: https://github.com/DavidAnson/markdownlint-cli2
  rev: v0.21.0
  hooks:
  - id: markdownlint-cli2
    args:
    - --fix
    types:
    - markdown